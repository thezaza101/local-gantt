<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser-Based Work Planning</title>
    <!-- Local Bootstrap CSS -->
    <link href="vendor/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link href="styles.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Work Planner</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item d-flex gap-2">
                        <button id="importBtn" class="btn btn-outline-light btn-sm">Import JSON</button>
                        <button id="exportBtn" class="btn btn-outline-light btn-sm">Export JSON</button>
                        <input type="file" id="fileInput" accept=".json" style="display: none;">
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Toolbar / Plan Selector -->
    <div class="toolbar d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
            <label for="planSelector" class="form-label mb-0 fw-bold">Plan:</label>
            <select class="form-select form-select-sm w-auto" id="planSelector">
                <option value="" disabled selected id="currentPlanDisplay">Select a Plan</option>
            </select>
        </div>
        <div class="btn-group">
            <button type="button" id="addTaskBtn" class="btn btn-sm btn-primary">Add Task</button>
            <button type="button" id="newPlanBtn" class="btn btn-sm btn-outline-secondary">New Plan</button>
            <button type="button" id="renamePlanBtn" class="btn btn-sm btn-outline-secondary">Rename</button>
            <button type="button" id="duplicatePlanBtn" class="btn btn-sm btn-outline-secondary">Duplicate</button>
            <button type="button" id="deletePlanBtn" class="btn btn-sm btn-outline-secondary">Delete</button>
            <button type="button" id="addMarkerBtn" class="btn btn-sm btn-outline-secondary">Add Marker</button>
            <button type="button" id="capacityPlanBtn" class="btn btn-sm btn-outline-info">Capacity</button>
            <button type="button" id="legendsBtn" class="btn btn-sm btn-outline-dark">Legends</button>
        </div>
    </div>

    <!-- Tag Filters -->
    <div class="tag-filters d-flex gap-2 align-items-center flex-wrap" id="tagFiltersContainer">
        <!-- Dynamically generated tags will appear here -->
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
        <!-- Planner Area (Gantt + Capacity Graph) -->
        <div class="planner-area d-flex flex-column">
            <div id="gantt-chart-container" class="gantt-chart-container p-4 d-flex align-items-center justify-content-center">
                <div class="text-center text-muted">
                    <h5>Gantt Chart Area</h5>
                    <p class="small">Timeline and tasks will render here</p>
                </div>
            </div>
            <div class="capacity-graph-container p-4 d-flex align-items-center justify-content-center border-top bg-light w-100">
                <canvas id="capacityGraphCanvas"></canvas>
            </div>
        </div>

        <!-- Analytics Panel -->
        <div class="analytics-panel p-4 d-flex flex-column align-items-center justify-content-center">
             <div class="text-center text-muted">
                 <h5>Analytics Panel</h5>
                 <p class="small">Effort summaries and tag metrics will render here</p>
             </div>
        </div>
    </div>

    <!-- Vendor JS -->
    <script src="vendor/chart.umd.js"></script>

    <!-- Core App Logic -->
    <script src="storage.js"></script>
    <script src="planner.js"></script>
    <script src="gantt.js"></script>
    <script src="capacity.js"></script>
    <script src="analytics.js"></script>
    <script src="graph.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>

    <!-- Task Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1" aria-labelledby="taskModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="taskModalLabel">Task Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="taskForm">
                        <input type="hidden" id="originalTaskId">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="taskId" class="form-label">Task ID</label>
                                <input type="text" class="form-control" id="taskId" required>
                            </div>
                            <div class="col-md-8">
                                <label for="taskTitle" class="form-label">Title</label>
                                <input type="text" class="form-control" id="taskTitle" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="taskDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="taskDescription" rows="2"></textarea>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="taskStartDate" class="form-label">Start Date</label>
                                <input type="date" class="form-control" id="taskStartDate" required>
                            </div>
                            <div class="col-md-4">
                                <label for="taskEndDate" class="form-label">End Date</label>
                                <input type="date" class="form-control" id="taskEndDate" required>
                            </div>
                            <div class="col-md-4">
                                <label for="taskRow" class="form-label">Row Number</label>
                                <input type="number" class="form-control" id="taskRow" min="0" value="1" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="taskTags" class="form-label">Tags (comma-separated)</label>
                                <input type="text" class="form-control" id="taskTags">
                            </div>
                            <div class="col-md-6">
                                <label for="taskLegend" class="form-label">Legend</label>
                                <select class="form-select" id="taskLegend">
                                    <!-- Populated dynamically -->
                                </select>
                            </div>
                        </div>
                        <h6 class="border-bottom pb-2">Effort</h6>
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="taskEffortDesign" class="form-label">Design</label>
                                <input type="number" class="form-control" id="taskEffortDesign" min="0" value="0">
                            </div>
                            <div class="col-md-4">
                                <label for="taskEffortDev" class="form-label">Dev</label>
                                <input type="number" class="form-control" id="taskEffortDev" min="0" value="0">
                            </div>
                            <div class="col-md-4">
                                <label for="taskEffortTest" class="form-label">Test</label>
                                <input type="number" class="form-control" id="taskEffortTest" min="0" value="0">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveTaskBtn">Save Task</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Legends Modal -->
    <div class="modal fade" id="legendsModal" tabindex="-1" aria-labelledby="legendsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="legendsModalLabel">Configure Task Legends</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <table class="table table-sm" id="legendsTable">
                        <thead>
                            <tr>
                                <th>Label</th>
                                <th>Fill Color</th>
                                <th>Border Color</th>
                                <th>Associated Tag</th>
                                <th style="width: 80px;"></th>
                            </tr>
                        </thead>
                        <tbody id="legendsTableBody">
                            <!-- Legends rows injected here -->
                        </tbody>
                    </table>
                    <button type="button" class="btn btn-sm btn-outline-primary" id="addLegendRowBtn">+ Add Legend</button>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="saveLegendsBtn">Save Legends</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Capacity Modal -->
    <div class="modal fade" id="capacityModal" tabindex="-1" aria-labelledby="capacityModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="capacityModalLabel">Capacity Planning</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="capacityForm">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="capacityGranularity" class="form-label">Granularity</label>
                                <select class="form-select" id="capacityGranularity">
                                    <option value="month">Month</option>
                                    <option value="week">Week</option>
                                    <option value="quarter">Quarter</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="demandAdjustmentPercent" class="form-label">Demand Adjustment (%)</label>
                                <input type="number" class="form-control" id="demandAdjustmentPercent" min="0" max="100" value="20">
                            </div>
                            <div class="col-md-4">
                                <label for="capacityAdjustmentPercent" class="form-label">Capacity Adjustment (%)</label>
                                <input type="number" class="form-control" id="capacityAdjustmentPercent" min="0" max="100" value="100">
                            </div>
                        </div>
                        <h6 class="border-bottom pb-2 mt-4">Capacity Ranges</h6>
                        <table class="table table-sm mt-3" id="capacityTable">
                            <thead>
                                <tr>
                                    <th>Start Date</th>
                                    <th>End Date</th>
                                    <th>Capacity</th>
                                    <th style="width: 50px;"></th>
                                </tr>
                            </thead>
                            <tbody id="capacityTableBody">
                                <!-- Capacity rows injected here -->
                            </tbody>
                        </table>
                        <button type="button" class="btn btn-sm btn-outline-primary" id="addCapacityRowBtn">+ Add Range</button>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveCapacityBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Local Bootstrap JS -->
    <script src="vendor/bootstrap.bundle.min.js"></script>
</body>
</html>
